<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento - VW Golf</title>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="payment.css">
  <script
    src="https://www.paypal.com/sdk/js?client-id=BAA2_HM5zptp2B5qQ-aVEUivvuHLPDtoQPZBa5zxh0eB2WaqRHD7WP4w8DnOiH_I5kMvGlR5okLjI4roos&currency=EUR&intent=capture&components=buttons,funding-eligibility,applepay&enable-funding=card,applepay">
  </script>
</head>

<body>

  
  <main class="page">
    <header class="topbar">
      <a class="back" href="home.html">&larr; Voltar</a>
      <div class="brand">Pagamento VW Golf</div>
    </header>

    <section class="payment-layout">
      <article class="product-summary">
        <div class="summary-image" id="productImage"></div>
        <div class="summary-details">
          <h1 id="productName">Carregando produto...</h1>
          <p id="productDescription">Aguarde enquanto buscamos o produto.</p>
          <div class="summary-price">
            <span>Preco</span>
            <strong id="productPrice">-</strong>
          </div>
          <div class="options-section" id="optionsSection">
            <div class="options-title">Opcoes do produto</div>
            <div class="option-grid" id="optionsGrid"></div>
          </div>
        </div>
      </article>

      <aside class="form-panel">
        <form id="paymentForm">
          <div class="section-title">Seu contato</div>
          <label>
            Nome completo
            <input type="text" name="fullName" required>
          </label>
          <label>
            E-mail
            <input type="email" name="email" required>
          </label>
          <label>
            Telefone
            <input type="tel" name="phone" placeholder="912 345 678" required>
          </label>

          <div class="total-row">
            <span>Total a pagar</span>
            <strong id="detailTotal">-</strong>
          </div>

          <div class="section-title">Pagamento</div>
          <div class="payment-section" id="checkout-actions">
          </div>

          <div id="formError" class="form-error" hidden></div>
        </form>
      </aside>
    </section>
  </main>

  <script src="payment.js"></script>
</body>

</html>
