<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento - VW Golf</title>
  <link rel="stylesheet" href="payment.css">
  <script
    src="https://www.paypal.com/sdk/js?client-id=BAA2_HM5zptp2B5qQ-aVEUivvuHLPDtoQPZBa5zxh0eB2WaqRHD7WP4w8DnOiH_I5kMvGlR5okLjI4roos&currency=EUR&intent=capture&components=buttons&enable-funding=card">
  </script>
</head>

<body>

  
  <main class="page">
    <header class="topbar">
      <a class="back" href="home.html">&larr; Voltar</a>
      <div class="brand">Pagamento VW Golf</div>
    </header>

    <section class="payment-layout">
      <article class="product-summary">
        <div class="summary-image" id="productImage"></div>
        <div class="summary-details">
          <h1 id="productName">Carregando produto...</h1>
          <p id="productDescription">Aguarde enquanto buscamos o produto.</p>
          <div class="summary-price">
            <span>Preco</span>
            <strong id="productPrice">-</strong>
          </div>
          <div class="options-section" id="optionsSection">
            <div class="options-title">Opcoes do produto</div>
            <div class="option-grid" id="optionsGrid"></div>
          </div>
        </div>
      </article>

      <aside class="form-panel">
        <form id="paymentForm">
          <div class="section-title">Seu contato</div>
          <label>
            Nome completo
            <input type="text" name="fullName" required>
          </label>
          <label>
            E-mail
            <input type="email" name="email" required>
          </label>
          <label>
            Telefone
            <input type="tel" name="phone" placeholder="912 345 678" required>
          </label>

          <div class="section-title">Endereco</div>
          <label>
            Rua e numero
            <input type="text" name="address" required>
          </label>
          <label>
            Codigo postal
            <input type="text" name="postal" required>
          </label>
          <label>
            Cidade
            <input type="text" name="city" required>
          </label>
          <label>
            Pais
            <div class="country-picker">
              <input type="text" name="country" id="countryInput" placeholder="Escolha ou escreva o pais" autocomplete="off" required>
              <div class="country-list" id="countryList" role="listbox" aria-label="Lista de paises"></div>
            </div>
          </label>

          <div class="section-title">Metodo de pagamento</div>
          <div class="payment-methods" role="group" aria-label="Metodos de pagamento">
            <label class="payment-option">
              <input type="radio" name="payment-method" value="paypal" checked>
              <span class="radio-circle"></span>
              <span class="option-text">PayPal</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment-method" value="card">
              <span class="radio-circle"></span>
              <span class="option-text">Cartao de Debito/Credito</span>
            </label>
          </div>

          <div class="total-row">
            <span>Total a pagar</span>
            <strong id="detailTotal">-</strong>
          </div>

          <div id="paypal-section" class="payment-section">
            <div id="paypal-buttons-container"></div>
          </div>

          <div id="card-section" class="payment-section" hidden>
            <div id="card-buttons-container"></div>
            <div class="notice">O PayPal processa o pagamento com cartao de debito/credito em um popup seguro.</div>
          </div>

          <div id="formError" class="form-error" hidden></div>
        </form>
      </aside>
    </section>
  </main>

  <script src="payment.js"></script>
</body>

</html>
